<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dylan's Gym">
<title>Dylan's Progressive Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
  --text: #f0f0f0; --muted: #777; --muted2: #555;
  --accent: #c8f04e; --accent-text: #0a0a0a;
  --green: #4ade80; --blue: #60a5fa; --orange: #fb923c; --purple: #a78bfa;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; min-height: 100%; }

.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.94); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 52px 20px 14px; border-bottom: 0.5px solid var(--border);
}
.top-bar h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.top-bar-sub { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
.top-bar p { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

.day-tabs {
  display: flex; gap: 8px; padding: 12px 20px;
  overflow-x: auto; scrollbar-width: none;
  position: sticky; top: 94px; z-index: 99;
  background: rgba(10,10,10,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 0.5px solid var(--border);
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0; padding: 7px 16px; border-radius: 30px;
  border: 0.5px solid var(--border2); font-size: 13px; font-weight: 500;
  cursor: pointer; background: var(--surface); color: var(--muted);
  transition: all 0.15s; font-family: 'DM Sans', sans-serif;
}
.day-tab.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }

/* View switcher */
.view-tabs {
  display: flex; gap: 0; margin: 16px 16px 0;
  background: var(--surface); border-radius: var(--radius); padding: 3px;
  border: 0.5px solid var(--border);
}
.view-tab {
  flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 500;
  cursor: pointer; border-radius: 11px; color: var(--muted);
  transition: all 0.15s; font-family: 'DM Sans', sans-serif; background: transparent; border: none;
}
.view-tab.active { background: var(--surface2); color: var(--text); }

.content { padding: 16px 16px 110px; }

/* Level selector */
.level-bar {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.level-info { flex: 1; }
.level-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-family: 'DM Mono', monospace; }
.level-name { font-size: 18px; font-weight: 600; color: var(--accent); margin-top: 2px; }
.level-sublabel { font-size: 12px; color: var(--muted); margin-top: 1px; }
.level-btns { display: flex; gap: 6px; }
.level-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 0.5px solid var(--border2);
  background: var(--surface2); color: var(--text); font-size: 18px; font-weight: 300;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: all 0.15s; font-family: 'DM Sans', sans-serif; line-height: 1;
}
.level-btn:active { transform: scale(0.92); background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

/* Progress bar */
.progress-wrap { margin-bottom: 14px; }
.progress-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
.progress-top span { font-size: 12px; color: var(--muted); }
.progress-top strong { font-size: 12px; color: var(--accent); font-family: 'DM Mono', monospace; }
.progress-track { height: 3px; background: var(--surface2); border-radius: 2px; }
.progress-fill { height: 3px; background: var(--accent); border-radius: 2px; transition: width 0.35s ease; }

.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin: 18px 0 8px; padding-left: 2px; font-family: 'DM Mono', monospace;
}

/* Exercise cards */
.ex-card {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); margin-bottom: 8px; overflow: hidden;
  transition: border-color 0.2s ease;
}
.ex-card.ticked { border-color: rgba(74,222,128,0.35); background: rgba(74,222,128,0.03); }
.ex-row {
  display: flex; align-items: center; padding: 14px 16px; gap: 12px;
}
.ex-main { flex: 1; min-width: 0; }
.ex-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.3; }
.ex-sets { font-size: 12px; color: var(--muted); margin-top: 3px; font-family: 'DM Mono', monospace; }
.ex-sets.has-level { color: var(--blue); }
.ex-badge {
  font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600;
  font-family: 'DM Mono', monospace; flex-shrink: 0;
  background: rgba(200,240,78,0.1); color: var(--accent); border: 0.5px solid rgba(200,240,78,0.2);
}
.ex-badge.bw { background: rgba(161,161,170,0.1); color: var(--muted); border-color: var(--border2); }
.tick-btn {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid var(--border2); background: transparent;
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.18s;
}
.tick-btn.ticked { background: var(--green); border-color: var(--green); }
.tick-btn svg { width: 15px; height: 15px; stroke: transparent; transition: stroke 0.18s; }
.tick-btn.ticked svg { stroke: #0a0a0a; }

/* Info card */
.info-card {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px;
  font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 8px;
}
.info-card strong { color: var(--text); font-weight: 500; }

/* History view */
.hist-empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; line-height: 1.6; }
.hist-day {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
}
.hist-day-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; cursor: pointer;
}
.hist-day-left { flex: 1; }
.hist-day-date { font-size: 13px; font-weight: 600; color: var(--text); }
.hist-day-meta { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
.hist-day-badge {
  font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600;
  background: var(--accent-dim, rgba(200,240,78,0.1)); color: var(--accent);
  border: 0.5px solid rgba(200,240,78,0.2); font-family: 'DM Mono', monospace;
}
.hist-exercises { border-top: 0.5px solid var(--border); padding: 10px 16px; display: none; }
.hist-exercises.open { display: block; }
.hist-ex-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
.hist-ex-row:last-child { border-bottom: none; }
.hist-ex-name { font-size: 13px; color: var(--text); }
.hist-ex-sets { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
.hist-clear { font-size: 12px; color: var(--muted); background: none; border: 0.5px solid var(--border2); border-radius: 20px; padding: 5px 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 12px; }

/* Save bar */
.save-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 14px 20px 36px;
  background: rgba(10,10,10,0.96); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border);
}
.save-btn {
  width: 100%; padding: 15px; background: var(--accent); color: var(--accent-text);
  border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600;
  font-family: 'DM Sans', sans-serif; cursor: pointer; transition: transform 0.1s;
}
.save-btn:active { transform: scale(0.98); }
.save-btn:disabled { opacity: 0.4; }

.toast {
  position: fixed; bottom: 115px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--surface2); color: var(--text); padding: 11px 20px;
  border-radius: 30px; font-size: 13px; font-weight: 500;
  border: 0.5px solid var(--border2); opacity: 0; transition: all 0.28s;
  pointer-events: none; white-space: nowrap; z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Progressive Tracker</h1>
  <div class="top-bar-sub">
    <p id="top-date">TRUE FORGE FITNESS</p>
  </div>
</div>

<div class="day-tabs">
  <button class="day-tab active" onclick="switchDay('push')">Push</button>
  <button class="day-tab" onclick="switchDay('pull')">Pull</button>
  <button class="day-tab" onclick="switchDay('legs')">Legs</button>
  <button class="day-tab" onclick="switchDay('shoulders')">Shoulders</button>
</div>

<div class="view-tabs">
  <button class="view-tab active" onclick="switchView('workout')">Workout</button>
  <button class="view-tab" onclick="switchView('history')">History</button>
</div>

<div class="content" id="content"></div>

<div class="save-bar">
  <button class="save-btn" id="save-btn" onclick="saveSession()">Log Session</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
// type: compound=+2kg, isolation=+1kg, cable=+2.5kg, bw=no change, burn=+1kg
const days = {
  push: {
    exercises: [
      { name: "DB Chest press",               type:"compound",  base:[[10,24],[8,26],[6,28],[6,30]],  comment:"Flat bench. Touch weights at top." },
      { name: "DB Incline press",              type:"compound",  base:[[10,22],[8,24],[6,26],[6,24]],  comment:"45° bench. Eyes on one spot. Full ROM." },
      { name: "Flat DB Fly's",                 type:"isolation", base:[[12,9],[10,11],[8,13],[6,15]],  comment:"Turn pinkies inward to flex chest." },
      { name: "Bench dips",                    type:"bw",        base:[[10,"BW"],[10,"BW"],[10,"BW"]], comment:"Push chest out at top. Back close to bench." },
      { name: "Seated DB Tricep overhead ext.",type:"isolation", base:[[10,16],[8,18],[6,20]],         comment:"Elbows close to head. Diamond grip. Lower deep." },
      { name: "Cable tricep push down",        type:"cable",     base:[[12,null],[10,null],[8,null],[6,null]], comment:"Elbows close. Lean forward. Hinge at elbows." },
      { name: "Cable tricep overhead ext.",    type:"cable",     base:[[10,null],[8,null],[6,null]],   comment:"Glutes on bar. Arch back. Hinge at elbows." }
    ]
  },
  pull: {
    exercises: [
      { name: "Lateral pull down",             type:"compound",  base:[[10,39],[8,45],[6,52],[6,59]],  comment:"Pull straight to mid-chest. Control eccentric." },
      { name: "Close grip bicep pull down",    type:"compound",  base:[[12,45],[10,52],[8,59],[6,66]], comment:"Shoulder width. Pull to top of chest." },
      { name: "Seated machine row (low)",      type:"compound",  base:[[10,32],[8,36],[6,41]],         comment:"Row to middle of waist. 3 sets that count." },
      { name: "Standing strict curl (BB)",     type:"isolation", base:[[10,20],[8,25],[6,30],[6,35]],  comment:"Stand proud. Hinge at elbows. Full ROM!" },
      { name: "Preacher curl (EZ bar)",        type:"isolation", base:[[10,20],[8,25],[6,30],[6,25]],  comment:"Flex at top. Extend all the way down." },
      { name: "Seated alt. hammer curls",      type:"isolation", base:[[10,12],[10,13],[10,14]],       comment:"One up, one down. Full ROM." }
    ]
  },
  legs: {
    exercises: [
      { name: "45° Leg press",                 type:"compound",  base:[[10,40],[8,50],[6,60],[6,70]],  comment:"Feet middle, toes out. Test your limit!" },
      { name: "Thigh extensions",              type:"compound",  base:[[12,32],[10,34],[8,45],[6,52]], comment:"Strong up, slow down. Back on seat." },
      { name: "Lying leg curl",                type:"compound",  base:[[10,36],[8,41],[6,45],[6,50]],  comment:"Full ROM. Last rep slow under tension." },
      { name: "Adductions",                    type:"isolation", base:[[10,25],[8,39],[6,52]],         comment:"Squeeze at top 1 sec. Controlled eccentric." },
      { name: "Walking lunges",                type:"bw",        base:[["—","BW"],["—","BW"],["—","BW"]], comment:"Head up. Strong core. There and back." },
      { name: "Calve raises (standing)",       type:"burn",      base:[[20,22.5],[16,30],[12,37.5],[10,45]], comment:"Reps over weight. Feel the burn!" }
    ]
  },
  shoulders: {
    exercises: [
      { name: "Seated shoulder press (DB)",    type:"compound",  base:[[10,20],[8,22],[6,24],[6,26]],  comment:"Touch weights at top. Move some weight!" },
      { name: "Lateral raises (DB)",           type:"isolation", base:[[12,6],[10,8],[8,10],[6,12]],   comment:"Lift to shoulder height. Pour the cup out." },
      { name: "FR Plate lift",                 type:"burn",      base:[[10,10],[10,10],[10,10]],       comment:"Lift to face height. Slow down. Engage core." },
      { name: "Upright rows (BB)",             type:"compound",  base:[[10,25],[8,30],[6,30]],         comment:"Close grip. Bar to chin." },
      { name: "Machine straight press",        type:"compound",  base:[[16,15],[14,22.5],[12,30],[10,37.5]], comment:"Hands at ears. Press straight up." },
      { name: "Chest supported reverse fly's", type:"isolation", base:[[10,5],[10,5],[10,5]],          comment:"45° bench. Pronated hands. Full ROM." },
      { name: "Bench lateral raise",           type:"isolation", base:[[10,4],[8,4],[6,4]],            comment:"ENDER. Slow eccentric!" }
    ]
  }
};

const levelIncrements = { compound:2, isolation:1, cable:2.5, bw:0, burn:1 };

function getWeight(ex, level, setIdx) {
  const s = ex.base[setIdx];
  if (s[1] === "BW" || s[1] === null) return s[1];
  const inc = levelIncrements[ex.type] || 0;
  return parseFloat((s[1] + (level - 1) * inc).toFixed(1));
}

function formatSets(ex, level) {
  return ex.base.map((s, i) => {
    const w = getWeight(ex, level, i);
    const wStr = w === "BW" ? "BW" : w === null ? "—" : w + "kg";
    return s[0] + "×" + wStr;
  }).join("  ");
}

// ─── STATE ──────────────────────────────────────────────────────────────────
let state = JSON.parse(localStorage.getItem('prog_state') || JSON.stringify({
  currentDay: 'push',
  currentView: 'workout',
  levels: { push:{}, pull:{}, legs:{}, shoulders:{} },
  ticked: {},
  history: []
}));

let currentDay = state.currentDay || 'push';
let currentView = state.currentView || 'workout';

function saveState() { localStorage.setItem('prog_state', JSON.stringify(state)); }

// ─── LEVEL HELPERS ──────────────────────────────────────────────────────────
function getLevel(day, exIdx) {
  return (state.levels[day] && state.levels[day][exIdx]) || 1;
}
function setLevel(day, exIdx, val) {
  if (!state.levels[day]) state.levels[day] = {};
  state.levels[day][exIdx] = Math.max(1, val);
  saveState(); render();
}

// ─── TICK ────────────────────────────────────────────────────────────────────
function tick(day, exIdx) {
  const key = day + '_' + exIdx;
  state.ticked[key] = !state.ticked[key];
  saveState(); render();
}
function isTicked(day, exIdx) { return !!state.ticked[day + '_' + exIdx]; }
function tickedCount() {
  const exs = days[currentDay].exercises;
  return exs.filter((_,i) => isTicked(currentDay, i)).length;
}

// ─── RENDER WORKOUT ──────────────────────────────────────────────────────────
function renderWorkout() {
  const d = days[currentDay];
  const total = d.exercises.length;
  const done = tickedCount();
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  let html = `
    <div class="progress-wrap">
      <div class="progress-top"><span>${done} of ${total} done</span><strong>${pct}%</strong></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="section-label">Exercises</div>`;

  d.exercises.forEach((ex, i) => {
    const level = getLevel(currentDay, i);
    const ticked = isTicked(currentDay, i);
    const isBW = ex.type === 'bw';
    const setsStr = formatSets(ex, level);

    html += `
      <div class="ex-card ${ticked ? 'ticked' : ''}">
        <div class="ex-row">
          <div class="ex-main">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-sets ${!isBW && level > 1 ? 'has-level' : ''}">${setsStr}</div>
          </div>
          <span class="ex-badge ${isBW ? 'bw' : ''}">LVL ${isBW ? '—' : level}</span>
          <button class="tick-btn ${ticked ? 'ticked' : ''}" onclick="tick('${currentDay}',${i})" aria-label="Tick off">
            <svg viewBox="0 0 15 15" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="2.5,7.5 6,11 12.5,4"/>
            </svg>
          </button>
        </div>
      </div>`;
  });

  html += `<div class="section-label">Adjust levels</div>`;
  d.exercises.forEach((ex, i) => {
    const level = getLevel(currentDay, i);
    const isBW = ex.type === 'bw';
    if (isBW) return;
    const inc = levelIncrements[ex.type];
    html += `
      <div class="ex-card" style="margin-bottom:6px;">
        <div class="ex-row" style="padding:10px 16px;">
          <div class="ex-main">
            <div class="ex-name" style="font-size:13px;">${ex.name}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace;">+${inc}kg per level</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <button class="level-btn" onclick="setLevel('${currentDay}',${i},${level-1})" aria-label="decrease level">−</button>
            <span style="font-size:15px;font-weight:600;color:var(--accent);font-family:'DM Mono',monospace;min-width:52px;text-align:center;">LVL ${level}</span>
            <button class="level-btn" onclick="setLevel('${currentDay}',${i},${level+1})" aria-label="increase level">+</button>
          </div>
        </div>
      </div>`;
  });

  document.getElementById('content').innerHTML = html;
  document.getElementById('save-btn').disabled = done === 0;
}

// ─── RENDER HISTORY ──────────────────────────────────────────────────────────
function renderHistory() {
  const hist = state.history || [];
  if (hist.length === 0) {
    document.getElementById('content').innerHTML = `
      <div class="hist-empty">
        No sessions logged yet.<br>Complete a workout and tap<br><strong>Log Session</strong> to start your record.
      </div>`;
    return;
  }

  const reversed = [...hist].reverse();
  let html = '';
  reversed.forEach((session, idx) => {
    const realIdx = hist.length - 1 - idx;
    html += `
      <div class="hist-day">
        <div class="hist-day-header" onclick="toggleHistRow(${realIdx})">
          <div class="hist-day-left">
            <div class="hist-day-date">${session.date}</div>
            <div class="hist-day-meta">${session.day.toUpperCase()} · ${session.done}/${session.total} exercises</div>
          </div>
          <span class="hist-day-badge">LVL AVG ${session.avgLevel}</span>
        </div>
        <div class="hist-exercises" id="hist-row-${realIdx}">
          ${session.exercises.map(e => `
            <div class="hist-ex-row">
              <span class="hist-ex-name">${e.name}</span>
              <span class="hist-ex-sets">${e.sets}</span>
            </div>`).join('')}
        </div>
      </div>`;
  });

  html += `<button class="hist-clear" onclick="clearHistory()">Clear history</button>`;
  document.getElementById('content').innerHTML = html;
}

function toggleHistRow(idx) {
  const el = document.getElementById('hist-row-' + idx);
  if (el) el.classList.toggle('open');
}

function clearHistory() {
  if (confirm('Clear all history?')) {
    state.history = [];
    saveState();
    renderHistory();
  }
}

// ─── SAVE SESSION ────────────────────────────────────────────────────────────
function saveSession() {
  const d = days[currentDay];
  const done = tickedCount();
  if (done === 0) return;

  const exerciseLog = d.exercises
    .map((ex, i) => ({
      name: ex.name,
      ticked: isTicked(currentDay, i),
      sets: formatSets(ex, getLevel(currentDay, i)),
      level: getLevel(currentDay, i)
    }))
    .filter(e => e.ticked);

  const levels = exerciseLog.map(e => e.level).filter(l => typeof l === 'number');
  const avgLevel = levels.length > 0 ? (levels.reduce((a,b)=>a+b,0)/levels.length).toFixed(1) : '—';

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-ZA', { weekday:'short', day:'numeric', month:'short', year:'numeric' });

  const session = {
    date: dateStr,
    day: currentDay,
    done: done,
    total: d.exercises.length,
    avgLevel: avgLevel,
    exercises: exerciseLog.map(e => ({ name: e.name, sets: e.sets }))
  };

  if (!state.history) state.history = [];
  state.history.push(session);

  // Clear ticks for this day
  d.exercises.forEach((_, i) => { delete state.ticked[currentDay + '_' + i]; });
  saveState();

  showToast(`Session logged — ${currentDay.toUpperCase()} · ${done}/${d.exercises.length} done`);
  render();
}

// ─── NAVIGATION ─────────────────────────────────────────────────────────────
function switchDay(day) {
  currentDay = day;
  state.currentDay = day;
  saveState();
  document.querySelectorAll('.day-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.toLowerCase() === day);
  });
  if (currentView === 'workout') render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function switchView(view) {
  currentView = view;
  state.currentView = view;
  saveState();
  document.querySelectorAll('.view-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.toLowerCase() === view);
  });
  render();
}

function render() {
  if (currentView === 'workout') {
    renderWorkout();
  } else {
    renderHistory();
  }
}

// ─── DATE ────────────────────────────────────────────────────────────────────
function updateDate() {
  const d = new Date();
  document.getElementById('top-date').textContent =
    d.toLocaleDateString('en-ZA', { weekday:'long', day:'numeric', month:'long' }).toUpperCase();
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
updateDate();
document.querySelectorAll('.day-tab').forEach(t => {
  t.classList.toggle('active', t.textContent.toLowerCase() === currentDay);
});
document.querySelectorAll('.view-tab').forEach(t => {
  t.classList.toggle('active', t.textContent.toLowerCase() === currentView);
});
render();
</script>
</body>
