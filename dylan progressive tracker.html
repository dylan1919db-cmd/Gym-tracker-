<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dylan's Gym">
<title>Dylan's Progressive Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --surface: #1e1e1e; --surface2: #2a2a2a; --surface3: #343434;
  --border: rgba(255,255,255,0.14); --border2: rgba(255,255,255,0.15);
  --text: #f0f0f0; --muted: #b4b4b4; --muted2: #6f6f6f;
  --accent: #c8f04e; --accent-text: #0a0a0a; --accent-dim: rgba(200,240,78,0.12);
  --green: #4ade80; --green-dim: rgba(74,222,128,0.14);
  --blue: #60a5fa; --orange: #fb923c; --orange-dim: rgba(251,146,60,0.14);
  --red: #f87171; --red-dim: rgba(248,113,113,0.14);
  --purple: #a78bfa;
  --radius: 14px; --radius-sm: 9px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; min-height: 100%; }
input, button, select, textarea { font-family: inherit; }

/* Top bar */
.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: #0a0a0a;
  padding: 52px 20px 12px; border-bottom: 0.5px solid var(--border);
}
.top-bar h1 { font-size: 21px; font-weight: 600; letter-spacing: -0.5px; }
.top-bar p { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 3px; }

/* Main nav (Workout / History / Edit) */
.main-nav {
  display: flex; gap: 0; margin: 14px 16px 0;
  background: var(--surface); border-radius: var(--radius); padding: 4px;
  border: 1px solid rgba(255,255,255,0.2);
}
.main-nav-tab {
  flex: 1; padding: 11px 4px; text-align: center; font-size: 14px; font-weight: 500;
  cursor: pointer; border-radius: 11px; color: #ffffff;
  transition: all 0.15s; background: #2e2e2e; border: 1.5px solid rgba(255,255,255,0.5); margin: 0 4px;
}
.main-nav-tab.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }

/* Day tabs */
.day-tabs {
  display: flex; gap: 8px; padding: 14px 16px 4px;
  overflow-x: auto; scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0; padding: 9px 18px; border-radius: 30px;
  border: 1.5px solid rgba(255,255,255,0.5); font-size: 14px; font-weight: 500;
  cursor: pointer; background: #2e2e2e; color: #ffffff; transition: all 0.15s;
}
.day-tab.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }

.content { padding: 12px 16px 130px; }

/* Section label */
.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin: 18px 0 8px; padding-left: 2px; font-family: 'DM Mono', monospace;
  display: flex; justify-content: space-between; align-items: center;
}
.section-label .hint { text-transform: none; letter-spacing: 0; color: var(--muted2); font-weight: 400; }

/* Info card (warmup/cooldown) */
.info-card {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px;
  font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 8px;
}
.info-card strong { color: var(--text); font-weight: 500; }

/* Progress */
.progress-wrap { margin: 10px 0 4px; }
.progress-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
.progress-top span { font-size: 12px; color: var(--muted); }
.progress-top strong { font-size: 12px; color: var(--accent); font-family: 'DM Mono', monospace; }
.progress-track { height: 3px; background: var(--surface2); border-radius: 2px; }
.progress-fill { height: 3px; background: var(--accent); border-radius: 2px; transition: width 0.35s ease; }

/* Exercise card */
.ex-card {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; transition: border-color 0.2s;
}
.ex-card.ticked { border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.03); }
.ex-top { display: flex; align-items: center; padding: 13px 14px; gap: 11px; }
.ex-main { flex: 1; min-width: 0; }
.ex-name { font-size: 14px; font-weight: 500; line-height: 1.3; }
.ex-sets { font-size: 12px; color: var(--muted); margin-top: 3px; font-family: 'DM Mono', monospace; }
.ex-sets.leveled { color: var(--blue); }
.ex-badge {
  font-size: 10px; padding: 3px 7px; border-radius: 20px; font-weight: 600;
  font-family: 'DM Mono', monospace; flex-shrink: 0;
  background: var(--accent-dim); color: var(--accent); border: 0.5px solid rgba(200,240,78,0.2);
}
.ex-badge.bw { background: rgba(161,161,170,0.1); color: var(--muted); border-color: var(--border2); }
.ex-badge.reps { background: rgba(96,165,250,0.12); color: var(--blue); border-color: rgba(96,165,250,0.2); }
.tick-btn {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid var(--border2); background: transparent;
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.18s;
}
.tick-btn.ticked { background: var(--green); border-color: var(--green); }
.tick-btn svg { width: 15px; height: 15px; stroke: transparent; transition: stroke 0.18s; }
.tick-btn.ticked svg { stroke: #0a0a0a; }

/* Rating row (revealed after tick) */
.rate-row {
  display: flex; gap: 6px; padding: 0 14px 12px; border-top: 0.5px solid var(--border);
  padding-top: 11px; margin-top: 0;
}
.rate-label { font-size: 11px; color: var(--muted); align-self: center; margin-right: 2px; font-family: 'DM Mono', monospace; }
.rate-btn {
  flex: 1; padding: 7px 4px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
  border: 0.5px solid var(--border2); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.rate-btn.easy.sel { background: var(--green-dim); color: var(--green); border-color: rgba(74,222,128,0.4); }
.rate-btn.good.sel { background: var(--accent-dim); color: var(--accent); border-color: rgba(200,240,78,0.4); }
.rate-btn.hard.sel { background: var(--red-dim); color: var(--red); border-color: rgba(248,113,113,0.4); }

/* Recommendation banner */
.rec-banner {
  display: flex; align-items: flex-start; gap: 8px; padding: 9px 14px 12px;
  font-size: 12px; line-height: 1.4; border-top: 0.5px solid var(--border);
}
.rec-banner.up { color: var(--green); }
.rec-banner.nudge { color: var(--blue); }
.rec-banner.hold { color: var(--orange); }
.rec-banner svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; }
.rec-action {
  margin-left: auto; font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 20px;
  background: var(--green-dim); color: var(--green); border: 0.5px solid rgba(74,222,128,0.3);
  cursor: pointer; white-space: nowrap; align-self: center;
}

/* Date + difficulty submit block */
.submit-block { margin-top: 16px; }
.date-row {
  background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius);
  padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
}
.date-label { font-size: 13px; color: var(--text); }
.date-input {
  background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
  padding: 8px 10px; color: var(--text); font-size: 13px; font-family: 'DM Mono', monospace;
  -webkit-appearance: none; appearance: none;
}

/* Level adjust cards */
.lvl-card {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); margin-bottom: 6px;
}
.lvl-row { display: flex; align-items: center; padding: 11px 14px; gap: 10px; }
.lvl-main { flex: 1; min-width: 0; }
.lvl-name { font-size: 13px; font-weight: 500; }
.lvl-inc { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
.lvl-ctrl { display: flex; align-items: center; gap: 9px; }
.lvl-btn {
  width: 34px; height: 34px; border-radius: 50%; border: 0.5px solid var(--border2);
  background: var(--surface2); color: var(--text); font-size: 18px; font-weight: 300;
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.12s; line-height: 1;
}
.lvl-btn:active { transform: scale(0.9); background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.lvl-val { font-size: 14px; font-weight: 600; color: var(--accent); font-family: 'DM Mono', monospace; min-width: 50px; text-align: center; }

/* Save bar */
.save-bar {
  position: fixed; bottom: 0; left: 0; right: 0; padding: 14px 20px 36px;
  background: #0a0a0a;
  border-top: 0.5px solid var(--border);
}
.save-btn {
  width: 100%; padding: 15px; background: var(--accent); color: var(--accent-text);
  border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; transition: transform 0.1s;
}
.save-btn:active { transform: scale(0.98); }
.save-btn:disabled { opacity: 0.4; }
.save-btn.report { background: var(--blue); color: #0a0a0a; }
.save-btn.secondary { background: var(--surface2); color: #ffffff; border: 1.5px solid rgba(255,255,255,0.35); }

/* History */
.hist-empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; line-height: 1.6; }
.hist-day { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.hist-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
.hist-left { flex: 1; }
.hist-date { font-size: 13px; font-weight: 600; }
.hist-meta { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
.hist-badges { display: flex; gap: 6px; align-items: center; }
.diff-badge { font-size: 10px; padding: 4px 9px; border-radius: 20px; font-weight: 600; font-family: 'DM Mono', monospace; }
.diff-badge.easy { background: var(--green-dim); color: var(--green); }
.diff-badge.good { background: var(--accent-dim); color: var(--accent); }
.diff-badge.hard { background: var(--red-dim); color: var(--red); }
.hist-body { border-top: 0.5px solid var(--border); padding: 10px 16px; display: none; }
.hist-body.open { display: block; }
.hist-ex { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 0.5px solid var(--border); gap: 8px; }
.hist-ex:last-child { border-bottom: none; }
.hist-ex-name { font-size: 13px; flex: 1; }
.hist-ex-sets { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
.hist-ex-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-easy { background: var(--green); } .dot-good { background: var(--accent); } .dot-hard { background: var(--red); }
.hist-clear { font-size: 12px; color: var(--muted); background: none; border: 0.5px solid var(--border2); border-radius: 20px; padding: 6px 14px; cursor: pointer; margin-top: 12px; }

/* Edit page */
.edit-day-block { margin-bottom: 8px; }
.edit-ex {
  background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px; margin-bottom: 8px;
}
.edit-ex-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.edit-ex-name-input {
  background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
  padding: 8px 10px; color: var(--text); font-size: 13px; font-weight: 500; width: 100%;
}
.edit-del { background: var(--red-dim); color: var(--red); border: none; border-radius: var(--radius-sm); padding: 7px 11px; font-size: 12px; cursor: pointer; margin-left: 8px; flex-shrink: 0; }
.edit-field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
.edit-field { display: flex; flex-direction: column; gap: 3px; }
.edit-field label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-family: 'DM Mono', monospace; }
.edit-field input, .edit-field select {
  background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 7px;
  padding: 7px 9px; color: var(--text); font-size: 13px; font-family: 'DM Mono', monospace; width: 100%;
  -webkit-appearance: none; appearance: none;
}
.edit-sets-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-family: 'DM Mono', monospace; margin: 10px 0 5px; }
.set-edit-row { display: grid; grid-template-columns: 24px 1fr 1fr 30px; gap: 6px; align-items: center; margin-bottom: 5px; }
.set-edit-row span { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
.set-edit-row input {
  background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 6px;
  padding: 6px 8px; color: var(--text); font-size: 13px; text-align: center; font-family: 'DM Mono', monospace; width: 100%;
}
.set-del-btn { background: none; border: none; color: var(--red); font-size: 18px; cursor: pointer; }
.add-btn {
  width: 100%; padding: 11px; background: var(--surface2); border: 0.5px dashed var(--border2);
  border-radius: var(--radius); color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; margin-bottom: 8px;
}
.add-set-btn { font-size: 11px; color: var(--blue); background: none; border: 0.5px solid rgba(96,165,250,0.3); border-radius: 20px; padding: 5px 12px; cursor: pointer; margin-top: 6px; }
.core-edit {
  background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px; margin-bottom: 8px;
}
.core-edit textarea {
  background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
  padding: 9px 11px; color: var(--text); font-size: 13px; width: 100%; resize: vertical; min-height: 60px; line-height: 1.4;
}
.edit-note { font-size: 12px; color: var(--muted); line-height: 1.5; padding: 12px 14px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; }
.reset-all { font-size: 12px; color: var(--red); background: var(--red-dim); border: none; border-radius: 20px; padding: 8px 16px; cursor: pointer; margin-top: 8px; }

/* Core card (workout view) */
.core-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
.core-card.ticked { border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.03); }

/* Toast */
.toast {
  position: fixed; bottom: 115px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--surface3); color: var(--text); padding: 11px 20px; border-radius: 30px;
  font-size: 13px; font-weight: 500; border: 0.5px solid var(--border2);
  opacity: 0; transition: all 0.28s; pointer-events: none; max-width: 88%; text-align: center; z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.abbr-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 16px; }
.abbr-row { display: flex; gap: 10px; padding: 4px 0; font-size: 12px; }
.abbr-key { color: var(--accent); font-weight: 600; font-family: 'DM Mono', monospace; min-width: 38px; }
.abbr-val { color: var(--muted); }

/* ── Session complete overlay ────────────────────────────────────────────── */
.complete-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: #0a0a0a;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px 28px 48px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
.complete-overlay.show { opacity: 1; pointer-events: all; }

.complete-ring {
  width: 96px; height: 96px; border-radius: 50%;
  background: var(--accent-dim);
  border: 3px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
  animation: ring-pop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
}
.complete-ring svg { width: 48px; height: 48px; stroke: var(--accent); }
@keyframes ring-pop {
  0%   { transform: scale(0.4); opacity: 0; }
  100% { transform: scale(1);   opacity: 1; }
}

.complete-day {
  font-size: 13px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--accent);
  font-family: 'DM Mono', monospace; margin-bottom: 10px;
}
.complete-title {
  font-size: 30px; font-weight: 700; letter-spacing: -1px;
  color: var(--text); margin-bottom: 6px; text-align: center;
}
.complete-sub {
  font-size: 14px; color: var(--muted); margin-bottom: 36px; text-align: center;
}

.complete-stats {
  display: flex; gap: 16px; margin-bottom: 36px; width: 100%;
  justify-content: center;
}
.complete-stat {
  flex: 1; max-width: 110px;
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 14px 10px; text-align: center;
}
.complete-stat-val {
  font-size: 24px; font-weight: 700; color: var(--text);
  font-family: 'DM Mono', monospace; line-height: 1;
}
.complete-stat-label {
  font-size: 10px; color: var(--muted); margin-top: 5px;
  text-transform: uppercase; letter-spacing: 0.08em;
  font-family: 'DM Mono', monospace;
}

.complete-exercises {
  width: 100%; background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 32px;
}
.complete-ex-row {
  display: flex; align-items: center; padding: 11px 16px;
  border-bottom: 0.5px solid var(--border); gap: 10px;
}
.complete-ex-row:last-child { border-bottom: none; }
.complete-ex-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.complete-ex-name { flex: 1; font-size: 13px; color: var(--text); }
.complete-ex-level {
  font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace;
}
.complete-ex-rating {
  font-size: 10px; font-weight: 600; font-family: 'DM Mono', monospace;
  padding: 2px 7px; border-radius: 20px;
}
.complete-ex-rating.easy { background: var(--green-dim); color: var(--green); }
.complete-ex-rating.good { background: var(--accent-dim); color: var(--accent); }
.complete-ex-rating.hard { background: var(--red-dim); color: var(--red); }

.complete-done-btn {
  width: 100%; padding: 17px; background: var(--accent); color: var(--accent-text);
  border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700;
  cursor: pointer; letter-spacing: -0.3px;
}

</style>
</head>
<body>

<div class="top-bar">
  <h1>Progressive Tracker</h1>
  <p id="top-date">TRUE FORGE FITNESS</p>
</div>

<div class="main-nav">
  <button class="main-nav-tab active" onclick="switchMain('workout')">Workout</button>
  <button class="main-nav-tab" onclick="switchMain('history')">History</button>
  <button class="main-nav-tab" onclick="switchMain('edit')">Edit</button>
</div>

<div id="day-tabs-wrap"></div>

<div class="content" id="content"></div>

<div class="save-bar" id="save-bar"></div>


<div class="complete-overlay" id="complete-overlay">
  <div class="complete-ring">
    <svg viewBox="0 0 48 48" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="8,26 18,36 40,14"/>
    </svg>
  </div>
  <div class="complete-day" id="co-day"></div>
  <div class="complete-title" id="co-title">Session Complete</div>
  <div class="complete-sub" id="co-sub"></div>
  <div class="complete-stats" id="co-stats"></div>
  <div class="complete-exercises" id="co-exercises"></div>
  <button class="complete-done-btn" onclick="dismissComplete()">Done</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  DEFAULT PROGRAMME DATA
//  Each exercise: name, equip type, increment (kg per weight-bump), sets [reps, weight]
//  highReps = the higher rep ladder used on even levels
//  Level logic: odd = low reps, even = high reps; weight bumps every 2 levels
// ════════════════════════════════════════════════════════════════════════════
const DEFAULT_DATA = {
  warmup: "10 min cardio (CV of choice) + mobility",
  cooldown: "10 min cardio (CV of choice) + stretch",
  days: {
    push: {
      core: { levels: ["Crunch to knee x10 · Crunch to ankle x10 · Side to side x10 p.s — 3 rounds", "", "", ""] },
      exercises: [
        { name:"DB Chest press", inc:2, equip:"db", sets:[[10,24],[8,26],[6,28],[6,30]], hi:[12,10,8,6] },
        { name:"DB Incline press", inc:2, equip:"db", sets:[[10,22],[8,24],[6,26],[6,24]], hi:[12,10,8,6] },
        { name:"Flat DB Fly's", inc:1, equip:"db", sets:[[12,9],[10,11],[8,13],[6,15]], hi:[14,12,10,8] },
        { name:"Bench dips", inc:0, sets:[[10,"BW"],[10,"BW"],[10,"BW"]], hi:[12,12,12] },
        { name:"Seated DB Tricep overhead ext.", inc:1, equip:"db", sets:[[10,16],[8,18],[6,20]], hi:[12,10,8] },

// ════════════════════════════════════════════════════════════════════════════
//  WEIGHT STACKS & SNAPPING
//  Machine exercises use a fixed stack — weights snap to the nearest valid plate.
//  DB exercises above 20kg go up in 2kg steps (standard gym dumbbell rack).
// ════════════════════════════════════════════════════════════════════════════
const WEIGHT_STACKS = {
  thighExt:  [4.5,11,18,25,32,39,45,52,59,66,73,79,86,93,100,107,113],
  adductions:[7.5,15,22.5,30,37.5,45,52.5,60,67.5,75,82.5,90,105,112.5,120,127.5,135,142.5,150,157.5,165,172.5,180]
};

// Given a stack array, base weight, and number of steps up, return the stepped weight
function stackStep(stackArr, baseWeight, steps) {
  let baseIdx = stackArr.findIndex(v => Math.abs(v - baseWeight) < 0.01);
  if (baseIdx === -1) {
    // snap to nearest
    baseIdx = stackArr.reduce((best, v, i) =>
      Math.abs(v - baseWeight) < Math.abs(stackArr[best] - baseWeight) ? i : best, 0);
  }
  return stackArr[Math.min(baseIdx + steps, stackArr.length - 1)];
}

// Snap a DB weight to the nearest valid gym dumbbell
// Below 20kg: 1kg steps; above 20kg: 2kg steps
function snapDB(weight) {
  if (typeof weight !== 'number') return weight;
  if (weight <= 20) return Math.round(weight * 10) / 10; // keep precision up to 20
  return Math.round(weight / 2) * 2; // 2kg steps
}

//  STATE
// ════════════════════════════════════════════════════════════════════════════
let data = loadData();
let state = loadState();
let currentDay = state.currentDay || 'push';

// ── Safe storage wrappers (never throw, so rendering always works) ───────────
function safeGet(key) {
  try { return localStorage.getItem(key); } catch(e) { return null; }
}
function safeSet(key, val) {
  try { localStorage.setItem(key, val); } catch(e) { /* storage blocked — keep in memory */ }
}

function loadData() {
  const saved = safeGet('prog_data_v2');
  let d;
  if (saved) { try { d = JSON.parse(saved); } catch(e) {} }
  if (!d) d = JSON.parse(JSON.stringify(DEFAULT_DATA));
  migrateData(d);
  return d;
}
function saveData() { safeSet('prog_data_v2', JSON.stringify(data)); }

// Convert old { core: { text, level } } format to { core: { levels: [...] } }
function migrateData(d) {
  DAY_ORDER.forEach(day => {
    const core = d.days && d.days[day] && d.days[day].core;
    if (core && !Array.isArray(core.levels)) {
      core.levels = [core.text || '', '', '', ''];
      delete core.text;
      delete core.level;
    }
  });
}

function loadState() {
  const saved = safeGet('prog_state_v2');
  let s;
  if (saved) { try { s = JSON.parse(saved); } catch(e) {} }
  // No seeded history — start fresh
  if (!s) s = { currentDay:'push', levels:{}, coreLevels:{}, ticked:{}, ratings:{}, coreTicked:{}, history:[], sessionDate:null, bodyweight:[], sessionCount:0 };
  if (!s.bodyweight) s.bodyweight = [];
  if (!s.sessionCount) s.sessionCount = s.history ? s.history.length : 0;
  migrateState(s);
  return s;
}

// Migrate levels from old index-based {push:{0:3,1:2}} to name-based {push:{"DB Chest press":3}}
// This ensures deleting or reordering exercises never corrupts level data
function migrateState(s) {
  DAY_ORDER.forEach(day => {
    if (!s.levels[day]) { s.levels[day] = {}; return; }
    const dayLevels = s.levels[day];
    // Check if any key is a pure integer — if so, this day still uses old format
    const hasIndexKeys = Object.keys(dayLevels).some(k => /^\d+$/.test(k));
    if (!hasIndexKeys) return; // already name-based
    // Convert: use DEFAULT_DATA exercise order to map index -> name
    const defaultExercises = DEFAULT_DATA.days[day] && DEFAULT_DATA.days[day].exercises;
    if (!defaultExercises) return;
    const newLevels = {};
    Object.entries(dayLevels).forEach(([k, v]) => {
      if (/^\d+$/.test(k)) {
        const ex = defaultExercises[parseInt(k)];
        if (ex) newLevels[ex.name] = v;
      } else {
        newLevels[k] = v; // already a name
      }
    });
    s.levels[day] = newLevels;
  });
}
function saveState() { safeSet('prog_state_v2', JSON.stringify(state)); }

// ── Level helpers (name-based, not index-based) ──────────────────────────────
function getLevel(day, idx) {
  const ex = data.days[day] && data.days[day].exercises[idx];
  if (!ex) return 1;
  return (state.levels[day] && state.levels[day][ex.name]) || 1;
}
function setLevel(day, idx, val) {
  const ex = data.days[day] && data.days[day].exercises[idx];
  if (!ex) return;
  if (!state.levels[day]) state.levels[day] = {};
  state.levels[day][ex.name] = Math.max(1, val);
  saveState(); render();
}
function getLevelByName(day, name) {
  return (state.levels[day] && state.levels[day][name]) || 1;
}
function setLevelByName(day, name, val) {
  if (!state.levels[day]) state.levels[day] = {};
  state.levels[day][name] = Math.max(1, val);
  saveState(); render();
}
function getCoreLevel(day) { return (state.coreLevels && state.coreLevels[day]) || 1; }
function setCoreLevel(day, val) {
  if (!state.coreLevels) state.coreLevels = {};
  state.coreLevels[day] = Math.max(1, val);
  saveState(); render();
}

// Compute weight + reps for a given level
// level 1 = base weight / low reps;  2 = base / high reps; 3 = +1inc / low; 4 = +1inc / high ...
function computeSets(ex, level) {
  const weightBumps = Math.floor((level - 1) / 2);
  const useHighReps = (level % 2 === 0);
  return ex.sets.map((s, i) => {
    const baseReps = s[0];
    const reps = useHighReps ? (ex.hi ? ex.hi[i] : baseReps) : baseReps;
    let weight = s[1];
    if (weight !== 'BW' && weight !== null && typeof weight === 'number') {
      if (ex.stack && WEIGHT_STACKS[ex.stack]) {
        // machine with fixed stack — step up through real plate values
        weight = stackStep(WEIGHT_STACKS[ex.stack], weight, weightBumps);
      } else if (!ex.stack) {
        // standard inc progression; snap to 2kg steps above 20kg only for dumbbells
        const raw = parseFloat((weight + weightBumps * (ex.inc || 0)).toFixed(1));
        const snapped = (ex.equip === 'db') ? snapDB(raw) : raw;
        weight = (ex.ceil != null) ? Math.min(snapped, ex.ceil) : snapped;
      } else {
        // barbell or other non-stack — straight increment
        weight = parseFloat((weight + weightBumps * (ex.inc || 0)).toFixed(1));
      }
    } else if (weight === 'BW' && ex.bagStart && weightBumps > 0) {
      weight = (weightBumps * (ex.inc || 0)) + 'kg bag';
    }
    return [reps, weight];
  });
}

function formatSets(ex, level) {
  return computeSets(ex, level).map(s => {
    const reps = s[0] === '—' ? 'There & back' : s[0];
    const w = s[1];
    const wStr = (w === 'BW') ? 'BW' : (w === null ? '—' : (typeof w === 'number' ? w+'kg' : w));
    return reps + '×' + wStr;
  }).join('  ');
}

// Export-friendly version: array of "10x24kg" strings, plain "x" (no special chars) for spreadsheet safety
function formatSetsArray(ex, level) {
  return computeSets(ex, level).map(s => {
    const w = s[1];
    const wStr = (w === "BW") ? "BW" : (w === null ? "-" : (typeof w === 'number' ? w+"kg" : w));
    return s[0] + "x" + wStr;
  });
}

function isHighRepLevel(level) { return level % 2 === 0; }

// ── Tick + rating ────────────────────────────────────────────────────────────
function tickEx(day, idx) {
  const key = day+'_'+idx;
  state.ticked[key] = !state.ticked[key];
  if (!state.ticked[key]) delete state.ratings[key];
  saveState(); render();
}
function isTicked(day, idx) { return !!state.ticked[day+'_'+idx]; }
function rateEx(day, idx, rating) {
  state.ratings[day+'_'+idx] = rating;
  saveState(); render();
}
function getRating(day, idx) { return state.ratings[day+'_'+idx]; }

function tickCore(day) {
  state.coreTicked[day] = !state.coreTicked[day];
  saveState(); render();
}
function isCoreTicked(day) { return !!state.coreTicked[day]; }

function tickedCount(day) {
  return data.days[day].exercises.filter((_,i)=>isTicked(day,i)).length;
}

// ── Recommendation: based on last session's rating for this exercise ──────────
function lastRatingFor(day, exName) {
  for (let i = state.history.length - 1; i >= 0; i--) {
    const s = state.history[i];
    if (s.day !== day) continue;
    const found = s.exercises.find(e => e.name === exName);
    if (found && found.rating) return found.rating;
  }
  return null;
}

function renderWorkout() {
  const day = data.days[currentDay];
  const exs = day.exercises;
  const total = exs.length;
  const done = tickedCount(currentDay);
  const pct = total ? Math.round(done/total*100) : 0;

  let html = `
    <div class="section-label">Warm-up</div>
    <div class="info-card"><strong>${data.warmup}</strong></div>

    <div class="progress-wrap">
      <div class="progress-top"><span>${done} of ${total} done</span><strong>${pct}%</strong></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="section-label">Exercises <span class="hint">tick → rate</span></div>`;

  exs.forEach((ex, i) => {
    const level = getLevel(currentDay, i);
    const ticked = isTicked(currentDay, i);
    const rating = getRating(currentDay, i);
    const isBW = ex.inc === 0 && !ex.bagStart;
    const hiRep = isHighRepLevel(level);
    const setsStr = formatSets(ex, level);
    const lastRating = lastRatingFor(currentDay, ex.name);

    // recommendation banner (shown if we have a prior rating and not yet ticked)
    let recHtml = '';
    if (lastRating && !ticked) {
      if (lastRating === 'easy') {
        const nextStep = hiRep ? 'add weight (next level)' : 'increase reps (next level)';
        recHtml = `<div class="rec-banner up">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,9 7,5 11,9"/></svg>
          Last time felt easy — consider ${nextStep}.
          <span class="rec-action" onclick="setLevel('${currentDay}',${i},${level+1})">Level up</span>
        </div>`;
      } else if (lastRating === 'good') {
        recHtml = `<div class="rec-banner nudge">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,9 7,5 11,9"/></svg>
          Feeling solid — you could push to the next level when you're ready.
        </div>`;
      } else if (lastRating === 'hard') {
        recHtml = `<div class="rec-banner hold">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="7" x2="11" y2="7"/></svg>
          Last time felt hard — hold this level and master it.
        </div>`;
      }
    }

    let badge;
    if (isBW) badge = `<span class="ex-badge bw">BW</span>`;
    else badge = `<span class="ex-badge ${hiRep?'reps':''}">LVL ${level}${hiRep?' ↑reps':''}</span>`;

    html += `
      <div class="ex-card ${ticked?'ticked':''}">
        <div class="ex-top">
          <div class="ex-main">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-sets ${level>1?'leveled':''}">${setsStr}</div>
          </div>
          ${badge}
          <button class="tick-btn ${ticked?'ticked':''}" onclick="tickEx('${currentDay}',${i})" aria-label="Tick off ${ex.name}">
            <svg viewBox="0 0 15 15" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2.5,7.5 6,11 12.5,4"/></svg>
          </button>
        </div>
        ${ticked ? `
          <div class="rate-row">
            <span class="rate-label">Felt:</span>
            <button class="rate-btn easy ${rating==='easy'?'sel':''}" onclick="rateEx('${currentDay}',${i},'easy')">Easy</button>
            <button class="rate-btn good ${rating==='good'?'sel':''}" onclick="rateEx('${currentDay}',${i},'good')">Just right</button>
            <button class="rate-btn hard ${rating==='hard'?'sel':''}" onclick="rateEx('${currentDay}',${i},'hard')">Hard</button>
          </div>` : recHtml}
      </div>`;
  });

  // Core & abs (per day, with level)
  const coreLevel = getCoreLevel(currentDay);
  const coreTicked = isCoreTicked(currentDay);
  const coreLevels = day.core.levels || [''];
  let coreText = coreLevels[coreLevel-1];
  let coreNote = '';
  if (!coreText) {
    coreText = coreLevels[0] || '';
    coreNote = `<div style="font-size:11px;color:var(--muted2);margin-top:4px;">Level ${coreLevel} not defined yet — add it in the Edit tab</div>`;
  }
  html += `
    <div class="section-label">Core & Abs <span class="hint">${currentDay}</span></div>
    <div class="core-card ${coreTicked?'ticked':''}">
      <div class="ex-top">
        <div class="ex-main">
          <div class="ex-name">Core circuit</div>
          <div class="ex-sets">${coreText}</div>
          ${coreNote}
        </div>
        <span class="ex-badge">LVL ${coreLevel}</span>
        <button class="tick-btn ${coreTicked?'ticked':''}" onclick="tickCore('${currentDay}')" aria-label="Tick core">
          <svg viewBox="0 0 15 15" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2.5,7.5 6,11 12.5,4"/></svg>
        </button>

  html += `
    <div class="section-label">Cool-down</div>

  // Adjust levels section
  html += `<div class="section-label">Adjust levels <span class="hint">tap when ready to progress</span></div>`;
  exs.forEach((ex, i) => {
    const isBW = ex.inc === 0 && !ex.bagStart;

    const level = getLevel(currentDay, i);
    const incLabel = ex.bagStart ? `+${ex.inc}kg bag / 2 levels` : `+${ex.inc}kg / 2 levels · reps step between`;

  html += `

        </div>
      </div>

  document.getElementById('content').innerHTML = html;

  const todayIso = new Date().toISOString().slice(0,10);
  const dateVal = state.sessionDate || todayIso;
  document.getElementById('save-bar').innerHTML = `
    <div style="display:flex;gap:8px;align-items:center;">
      <input type="date" class="date-input" style="flex-shrink:0;" value="${dateVal}" max="${todayIso}" onchange="setSessionDate(this.value)" aria-label="Session date">
      <button class="save-btn" id="logbtn" style="flex:1;" onclick="saveSession()" ${done===0&&!coreTicked?'disabled':''}>Log Session</button>
    </div>`;
}

// ════════════════════════════════════════════════════════════════════════════
//  SAVE SESSION  (with date picker via prompt-free inline date)
// ════════════════════════════════════════════════════════════════════════════
function saveSession() {
  const day = data.days[currentDay];
  const done = tickedCount(currentDay);
  const coreTicked = isCoreTicked(currentDay);
  if (done === 0 && !coreTicked) return;

  // require ratings on ticked exercises
  const missing = day.exercises.some((ex,i)=> isTicked(currentDay,i) && !getRating(currentDay,i));
  if (missing) { showToast('Rate each ticked exercise first (Easy / Just right / Hard)'); return; }

  // date: use chosen sessionDate or today
  const dateObj = state.sessionDate ? new Date(state.sessionDate + 'T12:00:00') : new Date();
  const dateStr = dateObj.toLocaleDateString('en-ZA', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  const isoDate = dateObj.toISOString().slice(0,10);

  const exerciseLog = day.exercises
    .map((ex,i)=>({ name:ex.name, ticked:isTicked(currentDay,i), level:getLevel(currentDay,i),
                    sets:formatSets(ex,getLevel(currentDay,i)), setsArr:formatSetsArray(ex,getLevel(currentDay,i)),
                    rating:getRating(currentDay,i) }))
    .filter(e=>e.ticked);

  // overall difficulty = most common rating
  const counts = { easy:0, good:0, hard:0 };
  exerciseLog.forEach(e=>{ if(e.rating) counts[e.rating]++; });
  let overall = 'good';
  if (counts.hard >= counts.good && counts.hard >= counts.easy) overall = 'hard';
  else if (counts.easy >= counts.good && counts.easy >= counts.hard) overall = 'easy';

  const session = {
    date: dateStr, iso: isoDate, day: currentDay,
    done: done, total: day.exercises.length,
    coreDone: coreTicked, coreLevel: getCoreLevel(currentDay),
    overall: overall,
    exercises: exerciseLog
  };

  state.history.push(session);
  state.history.sort((a,b)=> (a.iso||'').localeCompare(b.iso||''));

  // clear ticks/ratings for this day
  day.exercises.forEach((_,i)=>{ delete state.ticked[currentDay+'_'+i]; delete state.ratings[currentDay+'_'+i]; });
  delete state.coreTicked[currentDay];
  state.sessionDate = null;
  saveState();

  state.sessionCount = (state.sessionCount || 0) + 1;
  saveState();

  if (state.sessionCount > 0 && state.sessionCount % 5 === 0) {
    setTimeout(() => showToast('💾 ' + state.sessionCount + ' sessions logged — remember to export a backup in Edit'), 3500);
  }

  render();
  // Show the full-screen completion overlay after the DOM has updated
  setTimeout(() => showComplete({ ...session, sessionCount: state.sessionCount }), 80);
}

function setSessionDate(val) { state.sessionDate = val; saveState(); }

// ════════════════════════════════════════════════════════════════════════════
//  BODYWEIGHT TRACKING
// ════════════════════════════════════════════════════════════════════════════
function logBodyweightFromInputs() {
  const dateVal = document.getElementById('bw-date').value;
  const valEl = document.getElementById('bw-val');
  const w = parseFloat(valEl.value);
  if (isNaN(w) || w <= 0) { showToast('Enter a valid weight'); return; }

  const dateObj = dateVal ? new Date(dateVal + 'T12:00:00') : new Date();
  const iso = dateObj.toISOString().slice(0,10);
  const dateStr = dateObj.toLocaleDateString('en-ZA', { weekday:'short', day:'numeric', month:'short', year:'numeric' });

  // overwrite any existing entry for the same date
  state.bodyweight = state.bodyweight.filter(e => e.iso !== iso);
  state.bodyweight.push({ iso, date: dateStr, weight: w });
  state.bodyweight.sort((a,b) => a.iso.localeCompare(b.iso));
  saveState();
  valEl.value = '';
  showToast(`Logged ${w}kg — ${dateStr}`);
  renderHistory();
}
function deleteBodyweight(iso) {
  state.bodyweight = state.bodyweight.filter(e => e.iso !== iso);
  saveState();
  renderHistory();
}
function renderBodyweightSection() {
  const entries = state.bodyweight || [];
  const today = new Date().toISOString().slice(0,10);

  let html = `<div class="section-label">Bodyweight</div>`;
  html += `
    <div class="ex-card">
      <div class="ex-top" style="flex-wrap:wrap; gap:8px;">
        <input type="date" class="date-input" id="bw-date" value="${today}" max="${today}" aria-label="Weigh-in date">
        <input type="number" inputmode="decimal" class="date-input" id="bw-val" placeholder="kg" style="width:70px;" aria-label="Bodyweight in kg">
        <button class="save-btn" style="flex:1; min-width:120px; padding:10px;" onclick="logBodyweightFromInputs()">Log weight</button>
      </div>
    </div>`;

  if (entries.length) {
    const first = entries[0], last = entries[entries.length-1];
    const totalDelta = (last.weight - first.weight);
    const sign = totalDelta > 0 ? '+' : '';
    if (entries.length > 1) {
      html += `<div class="info-card"><strong>${last.weight}kg</strong> latest (${last.date}) — ${sign}${totalDelta.toFixed(1)}kg since ${first.date}</div>`;
    } else {
      html += `<div class="info-card"><strong>${last.weight}kg</strong> logged on ${last.date}</div>`;
    }

    const rev = [...entries].reverse().slice(0, 10);
    html += `<div class="hist-day"><div class="hist-body open">`;
    rev.forEach(e => {
      const idx = entries.indexOf(e);
      const prev = entries[idx-1];
      let deltaStr = '';
      if (prev) {
        const d = e.weight - prev.weight;
        deltaStr = ` <span style="color:var(--muted);">(${d>=0?'+':''}${d.toFixed(1)}kg)</span>`;
      }
      html += `<div class="hist-ex">
        <span class="hist-ex-name">${e.date}</span>
        <span class="hist-ex-sets">${e.weight}kg${deltaStr}</span>
        <button class="set-del-btn" onclick="deleteBodyweight('${e.iso}')" aria-label="Delete entry" style="margin-left:6px;">×</button>
      </div>`;
    });
    html += `</div></div>`;
  } else {
    html += `<div class="info-card">No entries yet — log your weight to keep a simple record.</div>`;
  }
  return html;
}

function renderHistory() {

        <span style="font-size:12px; color:var(--muted); cursor:pointer; text-decoration:underline;" onclick="downloadCSV()">or download raw CSV data</span>
      </div>` : '';

  if (!state.history.length) {

  const rev = [...state.history].reverse();

    const diffLabel = diffClass === 'easy' ? 'EASY' : diffClass === 'hard' ? 'HARD' : 'GOOD';
    html += `
      <div class="hist-day">
        <div class="hist-head" onclick="toggleHist(${realIdx})">
          <div class="hist-left">

            <div class="hist-meta">${s.day.toUpperCase()} · ${s.done}/${s.total} exercises${s.coreDone?' · core':''}</div>
          </div>

            <span class="diff-badge ${diffClass}">${diffLabel}</span>
            <button class="set-del-btn" onclick="event.stopPropagation(); deleteSession(${realIdx})" aria-label="Delete session" style="margin-left:4px;">×</button>
          </div>
        </div>
        <div class="hist-body" id="hist-${realIdx}">

            <div class="hist-ex">
              <span class="hist-ex-dot dot-${e.rating||'good'}"></span>
              <span class="hist-ex-name">${e.name} <span style="color:var(--muted2);font-size:11px;">L${e.level}</span></span>
              <span class="hist-ex-sets">${e.sets}</span>

          ${s.coreDone?`<div class="hist-ex"><span class="hist-ex-dot dot-good"></span><span class="hist-ex-name">Core circuit <span style="color:var(--muted2);font-size:11px;">L${s.coreLevel}</span></span></div>`:''}

function toggleHist(i){ const el=document.getElementById('hist-'+i); if(el) el.classList.toggle('open'); }
function deleteSession(i){
  if(confirm('Delete this session? This cannot be undone.')){
    state.history.splice(i,1);
    saveState();
    renderHistory();

}
function clearHistory(){ if(confirm('Clear all logged history? This cannot be undone.')){ state.history=[]; saveState(); renderHistory(); } }

// ════════════════════════════════════════════════════════════════════════════
//  DOWNLOAD REPORT  (CSV — split columns, Excel-safe encoding)
// ════════════════════════════════════════════════════════════════════════════
function csvCell(val) {
  if (val === null || val === undefined) val = '';
  val = String(val);
  if (/[",\n]/.test(val)) val = '"' + val.replace(/"/g, '""') + '"';
  return val;
}
// backward-compatible: get an array of set strings ("10x24kg") for a logged exercise,
// using setsArr if present, else falling back to parsing the old joined string
function getSetTokens(e) {
  if (e.setsArr) return e.setsArr;
  if (e.sets) return e.sets.split(/\s+/).filter(Boolean).map(t => t.replace(/×/g, 'x').replace(/—/g, '-'));
  return [];
}
function downloadCSV() {
  // find the max number of sets across everything logged, so columns line up
  let maxSets = 0;
  state.history.forEach(s => s.exercises.forEach(e => { maxSets = Math.max(maxSets, getSetTokens(e).length); }));
  if (maxSets === 0) maxSets = 4;

  const header = ['Date','Day','Exercise','Level'];
  for (let i=1; i<=maxSets; i++) header.push('Set '+i+' (reps x weight)');
  header.push('Difficulty');

  let rows = [header.map(csvCell).join(',')];

  state.history.forEach(s=>{
    s.exercises.forEach(e=>{
      const tokens = getSetTokens(e);
      const row = [s.date, s.day, e.name, e.level];
      for (let i=0; i<maxSets; i++) row.push(tokens[i] || '');
      row.push(e.rating || '');
      rows.push(row.map(csvCell).join(','));
    });
    if (s.coreDone) {
      const row = [s.date, s.day, 'Core circuit', s.coreLevel];
      for (let i=0; i<maxSets; i++) row.push('');
      row.push('');
      rows.push(row.map(csvCell).join(','));
    }
  });

  const csv = rows.join('\r\n');
  // UTF-8 BOM so Excel renders °, ', and any other characters correctly
  const blob = new Blob(['\ufeff' + csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `gym-report-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Aggregate history into per-day, per-exercise progression summaries ───────
function aggregateHistory() {
  const byDay = {};
  DAY_ORDER.forEach(d => byDay[d] = { exercises: {}, core: null, sessionCount: 0 });
  let allDates = [];

  state.history.forEach(s => {
    allDates.push(s.iso);
    const d = byDay[s.day];
    if (!d) return;
    d.sessionCount++;
    s.exercises.forEach(e => {
      if (!d.exercises[e.name]) {
        d.exercises[e.name] = { sessions:0, firstLevel:e.level, lastLevel:e.level, ratings:{easy:0,good:0,hard:0}, firstSets:getSetTokens(e).join(' '), lastSets:getSetTokens(e).join(' '), lastDate:s.date };
      }
      const ex = d.exercises[e.name];
      ex.sessions++;
      ex.lastLevel = e.level;
      ex.lastSets = getSetTokens(e).join(' ');
      ex.lastDate = s.date;
      if (e.rating) ex.ratings[e.rating]++;
    });
    if (s.coreDone) {
      if (!d.core) d.core = { sessions:0, firstLevel:s.coreLevel, lastLevel:s.coreLevel };
      d.core.sessions++;
      d.core.lastLevel = s.coreLevel;
    }
  });

  allDates.sort();
  return {
    byDay,
    dateRange: allDates.length ? [allDates[0], allDates[allDates.length-1]] : null,
    totalSessions: state.history.length
  };
}

// ── Flag exercises worth the trainer's attention ──────────────────────────────
function computeFlags(byDay) {
  const flags = [];
  DAY_ORDER.forEach(d => {
    Object.entries(byDay[d].exercises).forEach(([name, ex]) => {
      const total = ex.ratings.easy + ex.ratings.good + ex.ratings.hard;
      if (total < 2) return;
      if (ex.ratings.easy === total && ex.lastLevel === ex.firstLevel) {
        flags.push(`${name} (${d.toUpperCase()}): rated Easy every session but still at L${ex.lastLevel} — likely ready to progress.`);
      }
      if (ex.ratings.hard >= Math.ceil(total/2) && ex.ratings.hard >= 2) {
        flags.push(`${name} (${d.toUpperCase()}): rated Hard in ${ex.ratings.hard}/${total} sessions — consider holding the load or reviewing form.`);
      }
    });
  });
  return flags;
}

// ── Lazy-load an external script (used for the PDF libraries) ────────────────
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function ensurePDFLibs() {
  if (!window.jspdf) {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  }
  if (!window.jspdf || !window.jspdf.jsPDF.API.autoTable) {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js');
  }
}

function pdfFilename() {
  return `progress-report-${new Date().toISOString().slice(0,10)}.pdf`;
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ════════════════════════════════════════════════════════════════════════════
//  DOWNLOAD REPORT — PDF summary (falls back to CSV if the PDF library fails to load)
// ════════════════════════════════════════════════════════════════════════════
async function downloadReport() {
  if (!state.history.length) { showToast('No sessions logged yet'); return; }
  showToast('Generating PDF…');
  try {
    await ensurePDFLibs();
    const doc = buildPDF();
    downloadBlob(doc.output('blob'), pdfFilename());
    showToast('PDF downloaded — check your Files');
  } catch (e) {
    downloadCSV();
    showToast('Could not generate PDF — downloaded CSV instead');
  }
}

// Share the PDF via the device share sheet (WhatsApp, Mail, AirDrop, etc.)
async function shareReport() {
  if (!state.history.length) { showToast('No sessions logged yet'); return; }
  if (!navigator.share) { showToast('Sharing is not supported in this browser — use Download instead'); return; }
  showToast('Generating PDF…');
  try {
    await ensurePDFLibs();
    const doc = buildPDF();
    const blob = doc.output('blob');
    const file = new File([blob], pdfFilename(), { type: 'application/pdf' });

    if (navigator.canShare && !navigator.canShare({ files: [file] })) {
      downloadBlob(blob, pdfFilename());
      showToast('Sharing files not supported here — downloaded instead');
      return;
    }
    await navigator.share({ files: [file], title: 'Progress Report' });
  } catch (e) {
    if (e && e.name === 'AbortError') return; // user cancelled the share sheet
    downloadCSV();
    showToast('Could not share PDF — downloaded CSV instead');
  }
}

function buildPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const bw = state.bodyweight || [];
  const sessions = [...state.history]; // already sorted chronologically
  if (!sessions.length) return doc;

  const range = sessions[0].iso + ' to ' + sessions[sessions.length-1].iso;

  // ── Cover page header ────────────────────────────────────────────────────
  doc.setFontSize(20);
  doc.setTextColor(0);
  doc.text('Training Report', 14, 22);

  doc.setFontSize(10);
  doc.setTextColor(80);
  doc.text('Athlete: Dylan Beaumont', 14, 30);
  doc.text('Programme: True Forge Fitness — 4 Day Split', 14, 36);
  doc.text('Period: ' + range, 14, 42);
  doc.text('Total sessions: ' + sessions.length, 14, 48);
  doc.text('Generated: ' + new Date().toLocaleDateString('en-ZA'), 14, 54);

  // ── Bodyweight ───────────────────────────────────────────────────────────
  if (bw.length) {
    doc.setFontSize(11);
    doc.setTextColor(0);
    doc.text('Bodyweight', 14, 66);
    doc.setFontSize(9);
    doc.setTextColor(80);
    if (bw.length === 1) {
      doc.text('Start: ' + bw[0].weight + 'kg  (' + bw[0].date + ')', 14, 73);
    } else {
      const delta = bw[bw.length-1].weight - bw[0].weight;
      const sign = delta >= 0 ? '+' : '';
      doc.text(
        'Start: ' + bw[0].weight + 'kg  →  Current: ' + bw[bw.length-1].weight + 'kg  (' + sign + delta.toFixed(1) + 'kg)',
        14, 73
      );
    }
  }

  // ── Session-by-session log ────────────────────────────────────────────────
  // Each session = its own table. Colour coding via didDrawCell.
  // Difficulty colours (RGB):
  const COL = {
    easy: [34, 197, 94],    // green
    good: [163, 205, 57],   // accent yellow-green
    hard: [239, 68, 68]     // red
  };

  let pageNum = 1;

  sessions.forEach((s, si) => {
    doc.addPage();
    pageNum++;

    const dayLabel = s.day.toUpperCase();
    const overallCol = COL[s.overall] || COL.good;

    // Session header bar
    doc.setFillColor(...overallCol);
    doc.rect(0, 0, 210, 14, 'F');
    doc.setFontSize(13);
    doc.setTextColor(255);
    doc.setFont(undefined, 'bold');
    doc.text(s.date + '  ·  ' + dayLabel, 14, 9.5);

    // Overall pill on right
    const overallLabel = s.overall === 'easy' ? 'EASY' : s.overall === 'hard' ? 'HARD' : 'JUST RIGHT';
    const pillW = doc.getTextWidth(overallLabel) + 8;
    doc.setFontSize(9);
    doc.text(overallLabel, 210 - 14 - pillW + 4, 9.5);
    doc.setFont(undefined, 'normal');

    // Session meta line
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text(
      'Exercises: ' + s.done + '/' + s.total +
      (s.coreDone ? '  ·  Core: done (L' + s.coreLevel + ')' : '') +
      '  ·  Session ' + (si + 1) + ' of ' + sessions.length,
      14, 21
    );

    // Exercise table
    const rows = s.exercises.map(e => {
      const feel = e.rating === 'easy' ? 'EASY'
                 : e.rating === 'hard' ? 'HARD'
                 : 'JUST RIGHT';
      // sets: replace × with x for PDF safety
      const sets = (e.sets || '').replace(/×/g, 'x');
      return [e.name, 'L' + e.level, sets, feel];
    });

    if (s.coreDone) {
      rows.push(['Core circuit', 'L' + s.coreLevel, '—', 'DONE']);
    }

    doc.autoTable({
      startY: 25,
      head: [['Exercise', 'Level', 'Sets (reps x weight)', 'How it felt']],
      body: rows,
      styles: { fontSize: 9, cellPadding: 3, overflow: 'linebreak', textColor: [20,20,20] },
      headStyles: { fillColor: [30,30,30], textColor: 255, fontStyle: 'bold', fontSize: 9 },
      columnStyles: {
        0: { cellWidth: 62 },
        1: { cellWidth: 14, halign: 'center' },
        2: { cellWidth: 76 },
        3: { cellWidth: 30, halign: 'center', fontStyle: 'bold' }
      },
      margin: { left: 14, right: 14 },
      didDrawCell: function(data) {
        // Colour-code the "How it felt" column cells
        if (data.section === 'body' && data.column.index === 3) {
          const val = data.cell.raw;
          let rgb = null;
          if (val === 'EASY') rgb = COL.easy;
          else if (val === 'JUST RIGHT') rgb = COL.good;
          else if (val === 'HARD') rgb = COL.hard;
          if (rgb) {
            // Redraw cell background with colour, then rewrite text in white
            doc.setFillColor(...rgb);
            doc.rect(data.cell.x, data.cell.y, data.cell.width, data.cell.height, 'F');
            doc.setTextColor(255);
            doc.setFontSize(8);
            doc.setFont(undefined, 'bold');
            doc.text(
              val,
              data.cell.x + data.cell.width / 2,
              data.cell.y + data.cell.height / 2 + 3,
              { align: 'center' }
            );
            doc.setFont(undefined, 'normal');
            doc.setTextColor(20, 20, 20);
          }
        }
      }
    });
  });

  // ── Summary page ─────────────────────────────────────────────────────────
  doc.addPage();

  doc.setFontSize(16);
  doc.setTextColor(0);
  doc.setFont(undefined, 'bold');
  doc.text('Summary', 14, 18);
  doc.setFont(undefined, 'normal');

  // Overall rating tally across all sessions
  const tally = { easy:0, good:0, hard:0, total:0 };
  sessions.forEach(s => s.exercises.forEach(e => {
    if (e.rating) { tally[e.rating]++; tally.total++; }
  }));

  // Difficulty trend: first half vs second half
  let trendText = '';
  if (sessions.length >= 4) {
    const mid = Math.floor(sessions.length / 2);
    const t1 = { hard:0, total:0 }, t2 = { hard:0, total:0 };
    sessions.slice(0, mid).forEach(s => s.exercises.forEach(e => { if(e.rating){t1.total++;if(e.rating==='hard')t1.hard++;} }));
    sessions.slice(mid).forEach(s => s.exercises.forEach(e => { if(e.rating){t2.total++;if(e.rating==='hard')t2.hard++;} }));
    if (t1.total && t2.total) {
      const r1 = Math.round(t1.hard/t1.total*100), r2 = Math.round(t2.hard/t2.total*100);
      if (r2 > r1 + 10) trendText = 'Sessions have felt noticeably harder more recently (' + r1 + '% Hard early on, ' + r2 + '% more recently). Worth reviewing recovery and nutrition.';
      else if (r2 < r1 - 10) trendText = 'Sessions have felt easier more recently (' + r1 + '% Hard early on, ' + r2 + '% more recently). Good sign of adaptation.';
      else trendText = 'Difficulty has been fairly consistent throughout the period (' + r1 + '% Hard early, ' + r2 + '% recently).';
    }
  }

  // Per-day session counts and hard% 
  const dayStats = {};
  sessions.forEach(s => {
    if (!dayStats[s.day]) dayStats[s.day] = { sessions:0, hard:0, total:0 };
    dayStats[s.day].sessions++;
    s.exercises.forEach(e => { if(e.rating){dayStats[s.day].total++;if(e.rating==='hard')dayStats[s.day].hard++;} });
  });

  let y = 26;
  doc.setFontSize(10);
  doc.setTextColor(60);

  const summaryParts = [
    'This report covers ' + sessions.length + ' training session' + (sessions.length===1?'':'s') + ' between ' + range + '.',
    '',
    'Overall feel across all sessions:',
    '  Easy: ' + tally.easy + ' sets    Just Right: ' + tally.good + ' sets    Hard: ' + tally.hard + ' sets',
    '',
  ];
  if (trendText) summaryParts.push(trendText, '');

  summaryParts.push('Sessions by training day:');
  Object.entries(dayStats).forEach(([day, st]) => {
    const hardPct = st.total ? Math.round(st.hard/st.total*100) : 0;
    summaryParts.push('  ' + day.toUpperCase() + ': ' + st.sessions + ' session' + (st.sessions===1?'':'s') + '  (' + hardPct + '% of sets rated Hard)');
  });

  if (bw.length > 1) {
    const delta = bw[bw.length-1].weight - bw[0].weight;
    summaryParts.push('');
    summaryParts.push('Bodyweight: ' + bw[0].weight + 'kg → ' + bw[bw.length-1].weight + 'kg (' + (delta>=0?'+':'') + delta.toFixed(1) + 'kg)');
  }

  summaryParts.forEach(line => {
    if (line === '') { y += 4; return; }
    const wrapped = doc.splitTextToSize(line, 182);
    doc.text(wrapped, 14, y);
    y += wrapped.length * 5.5;
  });

  return doc;
}

    </label>`;

  // Warm-up / cool-down (global)
  html += `<div class="section-label">Warm-up / Cool-down <span class="hint">applies to all days</span></div>`;
  html += `<div class="core-edit">
    <div class="edit-sets-label">Warm-up</div>
    <textarea onchange="editGlobal('warmup',this.value)">${data.warmup}</textarea>
    <div class="edit-sets-label" style="margin-top:10px;">Cool-down</div>
    <textarea onchange="editGlobal('cooldown',this.value)">${data.cooldown}</textarea>
  </div>`;

  // Core for this day — define what each level means
  html += `<div class="section-label">Core & Abs <span class="hint">${currentDay} — define each level</span></div>`;
  html += `<div class="edit-note">Level 1 is the base circuit from your programme. Levels 2+ start blank — describe what changes (more reps, an extra round, a harder variation) once you and your trainer decide. If a level is left blank, the app falls back to Level 1.</div>`;
  (day.core.levels || ['']).forEach((lvlText, li) => {
    html += `<div class="core-edit">
      <div class="edit-sets-label">Level ${li+1}${li===0?' (base)':''}</div>
      <textarea onchange="editCoreLevel('${currentDay}',${li},this.value)" placeholder="${li===0?'':'e.g. same exercises, +5 reps each, 4 rounds'}">${lvlText}</textarea>
    </div>`;
  });
  html += `<button class="add-set-btn" onclick="addCoreLevel('${currentDay}')">+ Add another level</button>`;

  // Exercises
  html += `<div class="section-label">Exercises <span class="hint">${currentDay}</span></div>`;
  day.exercises.forEach((ex, i) => {
    html += `
      <div class="edit-ex">
        <div class="edit-ex-head">
          <input class="edit-ex-name-input" value="${ex.name.replace(/"/g,'&quot;')}" onchange="editExName('${currentDay}',${i},this.value)">
          <button class="edit-del" onclick="deleteEx('${currentDay}',${i})">Delete</button>
        </div>
        <div class="edit-field-grid">
          <div class="edit-field">
            <label>Increment (kg / 2 lvls)</label>
            <input type="number" inputmode="decimal" value="${ex.inc}" onchange="editInc('${currentDay}',${i},this.value)">
          </div>
          <div class="edit-field">
            <label>Current level</label>
            <input type="number" inputmode="numeric" value="${getLevel(currentDay,i)}" onchange="editCurLevel('${currentDay}',${i},this.value)">
          </div>
        </div>
        <div class="edit-sets-label">Sets — Level 1</div>
        <div style="font-size:11px;color:var(--muted2);margin-bottom:6px;">Low reps used on odd levels (L1, L3…). High reps used on even levels (L2, L4…).</div>
        ${ex.sets.map((s,si)=>`
          <div class="set-edit-row">
            <span>${si+1}</span>
            <input type="text" inputmode="numeric" value="${s[0]}" onchange="editSet('${currentDay}',${i},${si},0,this.value)" placeholder="reps">
            <input type="text" inputmode="decimal" value="${s[1]}" onchange="editSet('${currentDay}',${i},${si},1,this.value)" placeholder="weight">
            <button class="set-del-btn" onclick="deleteSet('${currentDay}',${i},${si})">×</button>
          </div>`).join('')}
        <button class="add-set-btn" onclick="addSet('${currentDay}',${i})">+ Add set</button>
        <div class="edit-sets-label" style="margin-top:10px;">High reps (even levels L2, L4…)</div>
        ${(ex.hi||[]).map((hr,si)=>`
          <div class="set-edit-row">
            <span>${si+1}</span>
            <input type="text" inputmode="numeric" value="${hr}" onchange="editHi('${currentDay}',${i},${si},this.value)" placeholder="reps">
            <span style="color:var(--muted2);font-size:11px;text-align:center;">same weight</span>
            <span></span>
          </div>`).join('')}
      </div>`;
  });

  html += `<button class="add-btn" onclick="addEx('${currentDay}')">+ Add exercise to ${currentDay}</button>`;

  // Abbreviations reference
  html += `<div class="section-label">Abbreviations <span class="hint">reference</span></div>`;
  html += `<div class="abbr-card">`;
  ABBREVIATIONS.forEach(a => {
    html += `<div class="abbr-row"><span class="abbr-key">${a[0]}</span><span class="abbr-val">${a[1]}</span></div>`;
  });
  html += `</div>`;

  html += `<button class="reset-all" onclick="resetProgramme()">Reset programme to original</button>`;

  document.getElementById('content').innerHTML = html;
}

// Edit operations
function editGlobal(key,val){ data[key]=val; saveData(); }
function editCoreLevel(day,li,val){ data.days[day].core.levels[li]=val; saveData(); }
function addCoreLevel(day){ data.days[day].core.levels.push(''); saveData(); renderEdit(); }
function editExName(day,i,val){ data.days[day].exercises[i].name=val; saveData(); }
function editInc(day,i,val){ data.days[day].exercises[i].inc=parseFloat(val)||0; saveData(); }
function editCurLevel(day,i,val){ setLevel(day,i,parseInt(val)||1); }
function editSet(day,i,si,field,val){
  const num = parseFloat(val);
  data.days[day].exercises[i].sets[si][field] = (val==='BW'||val==='—'||isNaN(num)) ? val : num;
  saveData();
}
function editHi(day,i,si,val){
  const ex = data.days[day].exercises[i];
  if (!ex.hi) ex.hi = ex.sets.map(()=>10);
  const num = parseInt(val);
  ex.hi[si] = isNaN(num) ? val : num;
  saveData();
}
function deleteSet(day,i,si){
  data.days[day].exercises[i].sets.splice(si,1);
  if(data.days[day].exercises[i].hi) data.days[day].exercises[i].hi.splice(si,1);
  saveData(); renderEdit();
}
function addSet(day,i){
  const ex=data.days[day].exercises[i];
  ex.sets.push([8,0]);
  if(ex.hi) ex.hi.push(10);
  saveData(); renderEdit();
}
function deleteEx(day,i){
  const ex = data.days[day].exercises[i];
  if(confirm(`Delete "${ex.name}"? Level data for this exercise will also be removed.`)){
    // Remove level entry by name (safe because we use name-based levels)
    if (state.levels[day]) delete state.levels[day][ex.name];
    data.days[day].exercises.splice(i,1);
    saveData(); saveState(); renderEdit();
    showToast(`Deleted — ${ex.name}`);
  }
}
function addEx(day){
  data.days[day].exercises.push({ name:"New exercise", inc:2, sets:[[10,10],[8,12],[6,14]], hi:[12,10,8] });
  saveData(); renderEdit();
}
function resetProgramme(){
  if(confirm('Reset ALL exercises and weights back to the original programme? Your history stays.')){
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    state.levels={}; state.coreLevels={};
    saveData(); saveState(); render();
    showToast('Programme reset to original');
  }
}

// ── Backup & Restore ───────────────────────────────────────────────────────
function exportBackup() {
  const backup = { exportedAt: new Date().toISOString(), data, state };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `gym-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup downloaded — keep it somewhere safe');
}
function importBackupFile(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.state) throw new Error('Invalid backup file');

      // If the backup has old programme data (pre-stack-fix), offer to restore
      // state only (history + levels + bodyweight) while keeping the current
      // corrected programme. This is the safer option for version upgrades.
      const hasOldData = parsed.data && parsed.data.days &&
        parsed.data.days.pull && parsed.data.days.pull.exercises &&
        parsed.data.days.pull.exercises.some(e => e.name === 'Seated machine row (low)');

      let restoreMode;
      if (hasOldData) {
        // Old backup detected — give the user a clear choice
        restoreMode = confirm(
          'This backup was created with an older version of the app.\n\n' +
          'OK = Restore history & levels only (recommended — keeps the updated exercises and machine stacks)\n\n' +
          'Cancel = Abort (nothing changes)'
        ) ? 'state-only' : 'abort';
      } else {
        restoreMode = confirm(
          'Restore from backup?\n\n' +
          'This will replace your current history, levels, and bodyweight with the backup contents.\n\n' +
          'OK to continue, Cancel to abort.'
        ) ? 'full' : 'abort';
      }

      if (restoreMode === 'abort') { input.value = ''; return; }

      if (restoreMode === 'full') {
        data = parsed.data;
        migrateData(data);
      }
      // Always restore state
      state = parsed.state;
      if (!state.bodyweight) state.bodyweight = [];
      if (!state.sessionCount) state.sessionCount = 0;
      migrateState(state);
      currentDay = state.currentDay || 'push';
      saveData(); saveState();
      renderDayTabs(); render();
      showToast(restoreMode === 'full' ? 'Full backup restored' : 'History & levels restored — programme kept up to date');
    } catch (err) {
      showToast('Could not read that file — is it a valid backup?');
    }
    input.value = '';
  };
  reader.readAsText(file);
}


// ════════════════════════════════════════════════════════════════════════════
//  SESSION COMPLETE OVERLAY
// ════════════════════════════════════════════════════════════════════════════
function showComplete(session) {
  const overlay = document.getElementById('complete-overlay');
  if (!overlay) return;

  // Day label
  document.getElementById('co-day').textContent = session.day.toUpperCase() + ' · ' + session.date;

  // Title based on overall difficulty
  const titles = {
    easy:  'Feeling Strong 💪',
    good:  'Session Complete',
    hard:  'You Pushed Hard'
  };
  document.getElementById('co-title').textContent = titles[session.overall] || 'Session Complete';

  // Subtitle
  const total = session.sessionCount || state.sessionCount;
  document.getElementById('co-sub').textContent =
    session.done + ' exercise' + (session.done===1?'':'s') + ' logged' +
    (total ? ' · Session #' + total : '');

  // Stats: exercises done, difficulty split
  const counts = { easy:0, good:0, hard:0 };
  session.exercises.forEach(e => { if(e.rating) counts[e.rating]++; });
  const dominant = counts.hard >= counts.good && counts.hard >= counts.easy ? 'Hard'
                 : counts.easy >= counts.good && counts.easy >= counts.hard ? 'Easy' : 'Good';

  document.getElementById('co-stats').innerHTML = `
    <div class="complete-stat">
      <div class="complete-stat-val">${session.done}</div>
      <div class="complete-stat-label">Exercises</div>
    </div>
    <div class="complete-stat">
      <div class="complete-stat-val">${state.sessionCount}</div>
      <div class="complete-stat-label">Total sessions</div>
    </div>
    <div class="complete-stat">
      <div class="complete-stat-val">${dominant}</div>
      <div class="complete-stat-label">Overall feel</div>
    </div>
  `;

  // Exercise list
  document.getElementById('co-exercises').innerHTML =
    session.exercises.map(e => `
      <div class="complete-ex-row">
        <span class="complete-ex-dot dot-${e.rating||'good'}"></span>
        <span class="complete-ex-name">${e.name}</span>
        <span class="complete-ex-level">L${e.level}</span>
        <span class="complete-ex-rating ${e.rating||'good'}">${e.rating==='easy'?'Easy':e.rating==='hard'?'Hard':'Good'}</span>
      </div>`).join('') +
    (session.coreDone ? `
      <div class="complete-ex-row">
        <span class="complete-ex-dot dot-good"></span>
        <span class="complete-ex-name">Core circuit</span>
        <span class="complete-ex-level">L${session.coreLevel}</span>
        <span class="complete-ex-rating good">Done</span>
      </div>` : '');

  overlay.classList.add('show');
}

function dismissComplete() {
  const overlay = document.getElementById('complete-overlay');
  if (overlay) overlay.classList.remove('show');
}

// ════════════════════════════════════════════════════════════════════════════
//  NAV + INIT
// ════════════════════════════════════════════════════════════════════════════
function switchMain(view) {
  currentMain = view;
  document.querySelectorAll('.main-nav-tab').forEach(t=>t.classList.toggle('active', t.textContent.toLowerCase().includes(view)));
  renderDayTabs(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function switchDay(day) {
  currentDay = day; state.currentDay = day; saveState();
  renderDayTabs(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function render() {
  if (currentMain==='workout') renderWorkout();
  else if (currentMain==='history') renderHistory();
  else renderEdit();
}
function updateDate() {
  document.getElementById('top-date').textContent =
    new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3200); }

updateDate();
renderDayTabs();
render();
</script>
